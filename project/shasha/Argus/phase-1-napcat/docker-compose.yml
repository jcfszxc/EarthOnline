version: '3.8'

services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: argus-napcat
    restart: always
    ports:
      - "6099:6099"   # WebUI
      - "3001:3001"   # OneBot 接口
    volumes:
      - ./data:/app/napcat/config
    environment:
      - TZ=Asia/Shanghai
      - NAPCAT_HOST=0.0.0.0
    networks:
      - napcat-net

networks:
  napcat-net:
    driver: bridge
